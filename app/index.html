<style>
  /* ---------- base ---------- */
  :root{
    --bg: #f6f4ee;
    --ink: #111111;
    --paper: #ffffff;
    --line: #111111;
    --line-soft: #d8d3c4;
    --muted: #6a6557;
    --green: #2da44e;
    --amber: #c08a00;
    --red:   #b03534;
    --indigo:#3a3a8c;
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-sm: 3px 3px 0 0 var(--ink);
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
            font-family:'Inter', system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }
  button{ font-family:inherit; }

  /* ---------- layout ---------- */
  .wrap{ max-width:1080px; margin:0 auto; padding:28px 24px 56px; }

  /* ---------- masthead ---------- */
  .masthead{
    border:3px solid var(--line); background:var(--paper);
    padding:18px 22px; box-shadow:var(--shadow);
    display:flex; align-items:baseline; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
  }
  .masthead .brand{ display:flex; align-items:center; gap:14px; }
  .logo{
    width:42px; height:42px; border:3px solid var(--line);
    background:var(--indigo); color:#fff; font-weight:800;
    display:grid; place-items:center; font-size:22px;
    box-shadow:var(--shadow-sm);
  }
  .masthead h1{ margin:0; font-size:26px; font-weight:800; letter-spacing:-0.02em; }
  .masthead h1 .accent{ color:var(--indigo); }
  .masthead .sub{ margin:2px 0 0; font-size:13px; color:var(--muted); }
  .masthead .stamp{
    border:2px solid var(--line); padding:6px 12px;
    font-family:'JetBrains Mono', monospace; font-size:12px;
    background:#fff8d6;
    box-shadow:var(--shadow-sm);
  }
  .tldr{
    margin:18px 0 24px; padding:14px 18px;
    border:3px solid var(--line); background:#fff;
    font-size:14px; line-height:1.5; box-shadow:var(--shadow-sm);
  }
  .tldr strong{ font-weight:700; }

  /* ---------- stats ---------- */
  .stats{
    display:grid; grid-template-columns:repeat(3,1fr); gap:18px;
    margin-bottom:28px;
  }
  .stat{
    border:3px solid var(--line); background:var(--paper);
    padding:20px 22px; box-shadow:var(--shadow);
  }
  .stat .num{
    font-family:'JetBrains Mono', monospace; font-weight:700;
    font-size:54px; line-height:1; letter-spacing:-0.03em;
  }
  .stat .label{
    margin-top:10px; font-size:13px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.08em; color:var(--muted);
  }
  .stat .foot{
    margin-top:8px; font-size:12px; color:var(--muted);
    font-family:'JetBrains Mono', monospace;
  }
  .stat.green  { background:#eaf7ee; }
  .stat.indigo { background:#efeeff; }
  .stat.amber  { background:#fff4cc; }

  /* ---------- filters ---------- */
  .toolbar{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    margin:0 0 14px;
  }
  .toolbar .lbl{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); font-weight:600; }
  .chip{
    border:2px solid var(--line); background:var(--paper);
    padding:5px 10px; font-size:12px; cursor:pointer;
    font-weight:600; color:var(--ink);
  }
  .chip[aria-pressed="true"]{ background:var(--ink); color:#fff; }
  .search{
    flex:1 1 220px; min-width:180px; padding:8px 10px;
    border:2px solid var(--line); background:#fff; font-size:13px;
  }

  /* ---------- card list ---------- */
  .cards{ display:flex; flex-direction:column; gap:18px; }
  .card{
    border:3px solid var(--line); background:var(--paper);
    box-shadow:var(--shadow);
  }
  .card .top{
    padding:18px 20px 4px;
    display:flex; flex-wrap:wrap; gap:14px; justify-content:space-between;
  }
  .card .id{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    color:var(--muted); letter-spacing:0.06em; text-transform:uppercase;
  }
  .card .head{ flex:1 1 460px; }
  .card h2{
    margin:0 0 8px; font-size:19px; font-weight:800; line-height:1.3;
    letter-spacing:-0.01em;
  }
  .card .row-tags{ display:flex; flex-wrap:wrap; gap:6px; }

  .badge{
    display:inline-block; padding:3px 8px;
    border:2px solid var(--line); font-size:11px;
    font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    background:#fff;
  }
  .badge.rec-merge       { background:#eaf7ee; }
  .badge.rec-human_review{ background:#fff4cc; }
  .badge.rec-reject      { background:#fde6e6; }
  .badge.sev-critical    { background:#111; color:#fff; }
  .badge.sev-high        { background:#ffd9d7; }
  .badge.sev-medium      { background:#fff0c2; }
  .badge.sev-low         { background:#eef3ff; }
  .badge.pri  { font-family:'JetBrains Mono', monospace; }
  .badge.pri.P0{ background:#111; color:#fff; }
  .badge.pri.P1{ background:#ffd9d7; }
  .badge.pri.P2{ background:#fff0c2; }
  .badge.pri.P3{ background:#eef3ff; }
  .badge.conf        { font-family:'JetBrains Mono', monospace; }
  .badge.conf-high   { background:#eaf7ee; }
  .badge.conf-medium { background:#fff4cc; }
  .badge.conf-low    { background:#fde6e6; }
  .badge.module{
    background:#efeeff;
  }

  /* ---------- meta + actions row ---------- */
  .mid{
    display:flex; flex-wrap:wrap; gap:14px; justify-content:space-between;
    align-items:center; padding:6px 20px 16px;
  }
  .mid .merged{
    font-family:'JetBrains Mono', monospace; font-size:13px;
  }
  .mid .merged b{ font-size:18px; }
  .actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .actions button{
    border:2px solid var(--line); background:#fff; color:var(--ink);
    padding:7px 12px; font-size:12px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.06em; cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .actions button[aria-pressed="true"][data-state="approve"]
    { background:var(--green); color:#fff; }
  .actions button[aria-pressed="true"][data-state="needs_review"]
    { background:var(--amber); color:#111; }
  .actions button[aria-pressed="true"][data-state="reject"]
    { background:var(--red);   color:#fff; }
  .actions button:hover{ background:#f0eee5; }
  .actions button[aria-pressed="true"]:hover{
    /* keep the pressed color obvious */ filter:none;
  }

  /* ---------- expandable evidence ---------- */
  details.evidence{
    border-top:2px dashed var(--line-soft);
    padding:0 20px 18px;
  }
  details.evidence > summary{
    list-style:none; cursor:pointer;
    padding:14px 0 8px; font-weight:700; font-size:13px;
    text-transform:uppercase; letter-spacing:0.08em;
    color:var(--ink); display:flex; align-items:center; gap:8px;
  }
  details.evidence > summary::-webkit-details-marker{ display:none; }
  details.evidence > summary::after{
    content:'+'; margin-left:auto; border:2px solid var(--line);
    width:22px; height:22px; display:grid; place-items:center;
    font-family:'JetBrains Mono', monospace; font-weight:700;
  }
  details.evidence[open] > summary::after{ content:'−'; }
  details.evidence .panel{
    display:grid; gap:14px; padding-top:8px;
  }
  details.evidence section{
    border:2px solid var(--line); background:#faf8f1;
    padding:12px 14px;
  }
  details.evidence section h3{
    margin:0 0 6px; font-size:11px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--muted); font-weight:700;
  }
  details.evidence section .body{
    font-size:13px; line-height:1.55; white-space:pre-wrap;
  }
  details.evidence ol, details.evidence ul{
    margin:0; padding-left:18px; font-size:13px; line-height:1.55;
  }
  details.evidence .reports{
    display:grid; gap:8px;
  }
  details.evidence .report{
    border:2px solid var(--line); background:#fff;
    padding:8px 10px; font-size:12.5px; line-height:1.45;
  }
  details.evidence .report .rid{
    font-family:'JetBrains Mono', monospace; font-weight:700;
    font-size:11px; margin-right:6px;
  }
  details.evidence .report code{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    background:#f6f4ee; padding:1px 4px; border:1px solid var(--line-soft);
  }
  details.evidence .report{
    display:flex; flex-direction:column; gap:6px;
  }
  details.evidence .report-head{
    display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;
  }
  details.evidence .rtitle{
    font-weight:700; font-size:13px;
  }
  details.evidence .rtags{
    display:flex; flex-wrap:wrap; gap:6px; font-size:11px;
  }
  details.evidence .rtag{
    background:#efeeff; border:1px solid var(--line);
    padding:1px 6px; font-family:'JetBrains Mono', monospace;
  }
  details.evidence .rtag code{
    background:transparent; border:0; padding:0;
  }
  details.evidence .report-body{
    font-size:13px; line-height:1.45; color:var(--ink);
  }
  details.evidence .rrepro{
    font-size:12.5px; line-height:1.45; white-space:pre-wrap;
    background:#fffbe6; border-left:3px solid var(--line);
    padding:6px 10px; margin:2px 0;
  }
  details.evidence .stack{
    margin:0; padding:8px 10px; background:#111; color:#fff;
    font-family:'JetBrains Mono', monospace; font-size:11.5px;
    line-height:1.45; white-space:pre-wrap; overflow-x:auto;
    border:2px solid var(--line);
  }
  details.evidence .panel-evidence{
    display:flex; flex-direction:column; gap:8px;
  }
  details.evidence .claim{
    border:2px solid var(--line); background:#fff; padding:8px 10px;
    display:flex; flex-direction:column; gap:6px;
  }
  details.evidence .claim-body{
    font-size:13px; line-height:1.5;
  }
  details.evidence .cites{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    color:var(--muted);
  }
  details.evidence .cites code{
    background:#f6f4ee; padding:1px 5px; border:1px solid var(--line-soft);
    margin-right:4px;
  }


  /* ---------- footnote ---------- */
  .footnote{
    margin-top:28px; padding:12px 16px;
    border:3px solid var(--line); background:#fff;
    font-size:12px; color:var(--muted); box-shadow:var(--shadow-sm);
  }
  .footnote code{ font-family:'JetBrains Mono', monospace; }

  /* ---------- empty/loading/error ---------- */
  .empty{
    border:3px dashed var(--line); padding:28px;
    text-align:center; color:var(--muted);
  }

  @media (max-width: 720px){
    .stats{ grid-template-columns:1fr; }
  }
</style>

(function () {
  var cfg = window.__LEMMA_CONFIG__ || {};
  var base = (cfg.apiUrl || window.location.origin).replace(/\/$/, "");
  var s = document.createElement("script");
  s.src = base + "/public/sdk/lemma-client.js";
  s.onload = boot;
  s.onerror = function () {
    document.getElementById("root").innerHTML =
      '<div class="wrap"><div class="empty">SDK failed to load from ' +
      base + '.</div></div>';
  };
  document.head.appendChild(s);
})();

async function boot() {
  if (!window.LemmaClient) {
    document.getElementById("root").innerHTML =
      '<div class="wrap"><div class="empty">SDK script loaded but LemmaClient missing.</div></div>';
    return;
  }
  const client = new window.LemmaClient.LemmaClient({});
  let liveMode = false;
  try {
    const state = await client.initialize();
    if (state.status !== "authenticated") {
      window.__FALLBACK_REASON__ = "not authenticated";
      renderFallback();
      return;
    }
    const records = client.records;
    const rows = await records.list("incidents", { limit: 200 });
    const items = Array.isArray(rows) ? rows : (rows && rows.items) || [];
    if (!items.length) {
      window.__FALLBACK_REASON__ = "no rows in table";
      renderFallback();
      return;
    }
    liveMode = true;
    window.__LIVE__ = true;
    render(items);
  } catch (err) {
    window.__FALLBACK_REASON__ = (err && err.message) || String(err);
    renderFallback();
  }
}

/* ============================================================
   Helpers
============================================================ */
function escapeHtml(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function asList(v){
  if (Array.isArray(v)) return v;
  if (v == null) return [];
  if (typeof v === "string"){
    return v.split(/\n+/).map(s => s.trim()).filter(Boolean);
  }
  return [v];
}
function safe(v){ return v == null ? "" : String(v); }
function normConf(c){
  const x = String(c || "").toLowerCase();
  if (x === "high" || x === "medium" || x === "low") return x;
  if (x.startsWith("h")) return "high";
  if (x.startsWith("m")) return "medium";
  if (x.startsWith("l")) return "low";
  return "medium";
}
function normRec(r){
  const x = String(r || "").toLowerCase();
  if (x === "merge" || x === "human_review" || x === "reject") return x;
  if (x.includes("merge")) return "merge";
  if (x.includes("reject")) return "reject";
  return "human_review";
}

const REC_LABEL = {
  merge: "Auto Merge",
  human_review: "Needs Review",
  reject: "Reject"
};

function fmtRepro(v){
  const arr = asList(v);
  if (arr.length === 0) return "<em>(none)</em>";
  return "<ol>" + arr.map(s => "<li>"+escapeHtml(s)+"</li>").join("") + "</ol>";
}
function fmtBullet(v){
  const arr = asList(v);
  if (arr.length === 0) return "<em>(none)</em>";
  return "<ul>" + arr.map(s => "<li>"+escapeHtml(s)+"</li>").join("") + "</ul>";
}

/* Render Evidence Panel:
   supports list of {claim, citations}, list of plain strings, plain string, or null. */
function renderEvidence(v){
  if (v == null) return "<em>(none)</em>";
  let arr;
  if (Array.isArray(v)) arr = v;
  else if (typeof v === "string"){
    try {
      const parsed = JSON.parse(v);
      if (Array.isArray(parsed)) arr = parsed;
      else return escapeHtml(v);
    } catch(_) { return escapeHtml(v); }
  } else if (typeof v === "object") arr = [v];
  else return escapeHtml(String(v));
  if (arr.length === 0) return "<em>(none)</em>";
  return arr.map(item => {
    if (item && typeof item === "object"){
      const claim = safe(item.claim || item.text || JSON.stringify(item));
      const cites = Array.isArray(item.citations) ? item.citations : [];
      const citeHtml = cites.length
        ? `<span class="cites">${cites.map(c => `<code>${escapeHtml(String(c))}</code>`).join(" ")}</span>`
        : "";
      return `<div class="claim"><div class="claim-body">${escapeHtml(claim)}</div>${citeHtml}</div>`;
    }
    return `<div class="claim"><div class="claim-body">${escapeHtml(String(item))}</div></div>`;
  }).join("");
}

/* renderFallback: when the live record path is unavailable, the
   page still has a useful demo fixture so the queue never goes dark. */
function renderFallback(){
  if (!window.__FALLBACK_NOTE__) {
    const note = document.createElement("div");
    note.style.cssText = "position:fixed;left:8px;bottom:8px;background:#111;color:#fff;padding:7px 11px;font:11px/1.4 'JetBrains Mono',ui-monospace,monospace;border:2px solid #fff;box-shadow:3px 3px 0 #111;z-index:9999;max-width:calc(100% - 24px);";
    const r = window.__FALLBACK_REASON__ || "live data unavailable";
    note.textContent = "LIVE DATA UNAVAILABLE · showing demo fixture (" + r + ")";
    document.body.appendChild(note);
    window.__FALLBACK_NOTE__ = note;
  }
  render(DEMO_FALLBACK);
}

/* Render an original report object/string into a tidy mini card. */
function renderReport(o){
  if (typeof o === "string"){
    return `<div class="report"><div class="report-body">${escapeHtml(o)}</div></div>`;
  }
  if (!o || typeof o !== "object"){
    return `<div class="report"><div class="report-body">${escapeHtml(String(o))}</div></div>`;
  }
  const id    = safe(o.id || "—");
  const title = safe(o.title || "");
  const body  = safe(o.body || "");
  const tags  = [
    o.component   ? `<span class="rtag">comp <code>${escapeHtml(String(o.component))}</code></span>` : "",
    o.error_code  ? `<span class="rtag">err <code>${escapeHtml(String(o.error_code))}</code></span>` : "",
    o.reporter    ? `<span class="rtag">by ${escapeHtml(String(o.reporter))}</span>` : "",
    o.vote_count  != null ? `<span class="rtag">▲ ${escapeHtml(String(o.vote_count))}</span>` : "",
    o.comment_count != null ? `<span class="rtag">💬 ${escapeHtml(String(o.comment_count))}</span>` : "",
    o.created_at  ? `<span class="rtag">${escapeHtml(String(o.created_at))}</span>` : "",
  ].filter(Boolean).join("");

  const stack = o.stack_trace
    ? `<pre class="stack">${escapeHtml(String(o.stack_trace))}</pre>` : "";

  const repro = o.repro_steps
    ? `<div class="rrepro">${escapeHtml(String(o.repro_steps))}</div>` : "";

  return `
    <div class="report">
      <div class="report-head">
        <span class="rid">${escapeHtml(id)}</span>
        ${title ? `<span class="rtitle">${escapeHtml(title)}</span>` : ""}
      </div>
      ${tags ? `<div class="rtags">${tags}</div>` : ""}
      ${body ? `<div class="report-body">${escapeHtml(body)}</div>` : ""}
      ${repro}
      ${stack}
    </div>
  `;
}

        <button class="chip" data-filter="all" aria-pressed="true">All (${engineerReady})</button>
        <button class="chip" data-filter="merge" aria-pressed="false">Auto Merge (${incidents.filter(i=>normRec(i.recommendation)==="merge").length})</button>
        <button class="chip" data-filter="human_review" aria-pressed="false">Needs Review (${incidents.filter(i=>normRec(i.recommendation)==="human_review").length})</button>
        <button class="chip" data-filter="reject" aria-pressed="false">Reject (${incidents.filter(i=>normRec(i.recommendation)==="reject").length})</button>
        <input class="search" id="q" placeholder="Search title, module, repro…" aria-label="Search incidents"/>
      </div>

      <section class="cards" id="cards"></section>

      <div class="footnote mono">
        Wired to <code>/incidents</code> via LemmaClient SDK · decisions live only in the browser ·
        data refreshed on every load.
      </div>
    </div>
  `;
  root.innerHTML = html;

  const cardsEl = document.getElementById("cards");
  const qEl = document.getElementById("q");
  const chips = root.querySelectorAll(".chip");

  function repaint(){
    const q = state.q.trim().toLowerCase();
    const visible = incidents
      .filter(r => state.filter === "all" || normRec(r.recommendation) === state.filter)
      .filter(r => !q ||
        (safe(r.title).toLowerCase().includes(q)) ||
        (safe(r.affected_module).toLowerCase().includes(q)) ||
        (safe(r.reproduction_steps).toLowerCase().includes(q))
      )
      .sort((a,b) => (Number(b.bug_count)||0) - (Number(a.bug_count)||0)
              || String(b.priority).localeCompare(String(a.priority)));

    if (visible.length === 0){
      cardsEl.innerHTML = '<div class="empty">No incidents match this filter.</div>';
      return;
    }
    cardsEl.innerHTML = visible.map(cardHtml).join("");
    bindCards();
  }

  function cardHtml(r){
    const rec = normRec(r.recommendation);
    const conf = normConf(r.confidence);
    const sev  = safe(r.severity || "—").toLowerCase();
    const pri  = safe(r.priority || "—").toUpperCase();
    const mod  = safe(r.affected_module || "—");
    const bugs = Number(r.bug_count) || 0;
    const id   = escapeHtml(r.incident_id || r.id || "");
    let titleRaw = safe(r.title || "(untitled)");
    // Strip trailing " (<module>)" — the LLM sometimes repeats it.
    if (mod && titleRaw.toLowerCase().endsWith(" (" + mod.toLowerCase() + ")")) {
      titleRaw = titleRaw.slice(0, -(mod.length + 3));
    }
    const title = escapeHtml(titleRaw);
    const recLabel = escapeHtml(REC_LABEL[rec] || r.recommendation || "—");
    const confLabel = escapeHtml(conf === "—" ? conf : conf.toUpperCase());

    /* original_reports may be array-of-objects or array-of-strings */
    const origs = asList(r.original_reports);

    return `
      <article class="card" data-id="${id}">
        <div class="top">
          <div class="head">
            <div class="id">${id}</div>
            <h2>${title}</h2>
            <div class="row-tags">
              <span class="badge rec-${rec}">${recLabel}</span>
              <span class="badge conf conf-${conf}">conf ${confLabel}</span>
              <span class="badge sev-${sev}">${escapeHtml(sev)}</span>
              <span class="badge pri ${escapeHtml(pri)}">${escapeHtml(pri)}</span>
              <span class="badge module">${escapeHtml(mod)}</span>
            </div>
          </div>
        </div>

        <div class="mid">
          <div class="merged"><b>${bugs}</b> report${bugs===1?"":"s"} merged</div>
          <div class="actions" role="group" aria-label="Decision">
            <button data-state="approve">Approve</button>
            <button data-state="needs_review">Needs Review</button>
            <button data-state="reject">Reject</button>
          </div>
        </div>

        <details class="evidence">
          <summary>View evidence</summary>
          <div class="panel">
            <section>
              <h3>Original Reports (${origs.length})</h3>
              <div class="reports">
                ${origs.length === 0
                  ? '<em>(none captured)</em>'
                  : origs.map(renderReport).join("")
                }
              </div>
            </section>

            <section>
              <h3>Reproduction Steps</h3>
              <div class="body">${fmtRepro(r.reproduction_steps)}</div>
            </section>

            <section>
              <h3>Evidence Panel</h3>
              <div class="panel-evidence">${renderEvidence(r.evidence_panel)}</div>
            </section>

            <section>
              <h3>Engineer Summary</h3>
              <div class="body">${escapeHtml(r.engineer_summary || "(none)")}</div>
            </section>

            <section>
              <h3>Recommendation Rationale</h3>
              <div class="body">${escapeHtml(r.recommendation_rationale || "(none)")}</div>
            </section>

            ${r.match_reasons ? `
              <section>
                <h3>Why these reports were clustered</h3>
                <div class="body">${fmtBullet(r.match_reasons)}</div>
              </section>` : ""}
          </div>
        </details>
      </article>
    `;
  }

  function bindCards(){
    cardsEl.querySelectorAll(".card").forEach(card => {
      const id = card.getAttribute("data-id");
      const pressed = state.decisions[id] || null;
      card.querySelectorAll(".actions button").forEach(btn => {
        const st = btn.getAttribute("data-state");
        btn.setAttribute("aria-pressed", String(st === pressed));
        btn.onclick = () => {
          const cur = state.decisions[id];
          state.decisions[id] = (cur === st) ? null : st;
          // light refresh: just update aria-pressed to avoid full re-render churn
          card.querySelectorAll(".actions button").forEach(b => {
            b.setAttribute("aria-pressed", String(b.getAttribute("data-state") === state.decisions[id]));
          });
        };
      });
    });
  }

  chips.forEach(c => {
    c.onclick = () => {
      state.filter = c.getAttribute("data-filter");
      chips.forEach(x => x.setAttribute("aria-pressed", String(x === c)));
      repaint();
    };
  });
  qEl.addEventListener("input", () => { state.q = qEl.value; repaint(); });

  repaint();
}
</script>
</body>
</html>
